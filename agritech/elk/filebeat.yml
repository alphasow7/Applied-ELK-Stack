filebeat.inputs:
  - type: container
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

processors:
  - add_host_metadata: ~
  - add_cloud_metadata: ~

# Filter for only AgriTech containers
processors:
  - drop_event:
      when:
        not:
          or:
            - contains:
                container.name: "agritech"
            - contains:
                container.name: "agritech_"

output.logstash:
  hosts: ["logstash:5045"]

logging.level: warning
