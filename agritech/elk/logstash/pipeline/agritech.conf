# AgriTech Logstash Pipeline
# Receives logs from:
#   1. Backend app (TCP/JSON via python-logstash)
#   2. Filebeat (Docker container logs)

input {
  # Backend application logs (python-logstash TCP)
  tcp {
    port => 5044
    codec => json_lines
    tags => ["agritech-api"]
  }

  # Filebeat input
  beats {
    port => 5045
    tags => ["docker-logs"]
  }

  # Syslog
  syslog {
    port => 5000
    tags => ["syslog"]
  }
}

filter {
  # ── API logs ───────────────────────────────────────────────
  if "agritech-api" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "agritech-api-logs" }
    }

    # Extract HTTP method and path
    if [message] =~ /^(GET|POST|PUT|DELETE|PATCH)/ {
      grok {
        match => {
          "message" => "%{WORD:http_method} %{URIPATHPARAM:request_path} → %{NUMBER:status_code:int} \(%{NUMBER:response_time_ms:float}ms\)"
        }
        tag_on_failure => []
      }

      # Tag slow requests
      if [response_time_ms] and [response_time_ms] > 500 {
        mutate { add_tag => ["slow-request"] }
      }

      # Tag errors
      if [status_code] and [status_code] >= 400 {
        mutate { add_tag => ["api-error"] }
      }
    }

    # Categorize USSD vs Web vs SMS
    if [request_path] =~ /\/ussd/ {
      mutate { add_field => { "channel" => "ussd" } }
    } else if [request_path] =~ /\/sms/ {
      mutate { add_field => { "channel" => "sms" } }
    } else {
      mutate { add_field => { "channel" => "web-api" } }
    }
  }

  # ── Docker logs ────────────────────────────────────────────
  if "docker-logs" in [tags] {
    mutate {
      add_field => { "[@metadata][index]" => "agritech-docker-logs" }
    }

    # Parse JSON logs from containers
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "parsed"
        tag_on_failure => ["_jsonparsefailure"]
      }
    }

    # Add container name as service
    if [container][name] {
      mutate {
        add_field => { "service" => "%{[container][name]}" }
      }
    }
  }

  # ── Common enrichment ──────────────────────────────────────
  mutate {
    add_field => {
      "environment" => "production"
      "platform"    => "agritech-senegal"
    }
  }

  # Timestamp normalization
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    tag_on_failure => []
  }

  # Remove internal Logstash fields
  mutate {
    remove_field => ["@version", "host"]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]:agritech-logs}-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Debug to stdout (remove in production)
  # stdout { codec => rubydebug }
}
