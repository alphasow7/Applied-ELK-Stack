version: '3.9'

services:
  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: agritech_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - agritech_db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/agritech.db
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
      - SECRET_KEY=${SECRET_KEY:-agritech-secret-key}
    ports:
      - "8000:8000"
    depends_on:
      - logstash
    networks:
      - agritech_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: agritech_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agritech_net

  # ─── ELK Stack ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: agritech_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=agritech-cluster
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - agritech_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v red"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: agritech_logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline
      - ./elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml
    ports:
      - "5044:5044"   # Beats / TCP input
      - "5000:5000"   # Syslog
      - "9600:9600"   # Logstash API
    environment:
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - agritech_net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: agritech_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - agritech_net

  # ─── Filebeat (ship container logs to Logstash) ────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: agritech_filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - agritech_net
    command: filebeat -e -strict.perms=false

volumes:
  agritech_db:
  es_data:

networks:
  agritech_net:
    driver: bridge
